name: Release APK

on:
  push:
    branches:
      - master

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" > .env
          echo "Created .env file with API key"

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Prepare release artifacts
        id: prepare
        run: |
          VERSION=$(grep "version:" pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk release-artifacts/lbww_flutter-${VERSION}.apk

          echo "Prepared release APK version: ${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.prepare.outputs.version }}-${{ github.run_number }}
          name: Release v${{ steps.prepare.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Flutter Timetable Release

            ### Version: ${{ steps.prepare.outputs.version }}
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}

            ### Downloads
            - **APK**: Download the APK file below to install on Android devices

            ### Installation
            1. Download the APK file
            2. Enable "Install from Unknown Sources" on your Android device
            3. Open the APK file to install

            ---
            Generated automatically by GitHub Actions
          files: |
            release-artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.prepare.outputs.version }}
          path: release-artifacts/*.apk
          retention-days: 90
