# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

plugins:
  dart_exception_lint:
    path: ../dart-exception-lint
    diagnostics:
      no_null_assertion: true
      no_manual_throw: true
      catch_throwing_third_party_calls: true
      catch_runtime_throw_sources: true
      catch_async_error_sources: true
      catch_inferred_throwing_calls: true
      catch_unknown_dynamic_calls: true
    #DO NOT JUST DISABLE EVERYTHING TO 'FIX' LINT ERRORS
    exception_analysis:
      analyze_test_files: false
      report:
        definite_throw: true
        possible_throw: true
        async_error: true
        unknown: true
      max_call_depth: 4
      analyze_third_party_source: true
      analyze_sdk_source: true
      treat_dynamic_invocation_as_throwing: true
      treat_external_calls_as_throwing: true
      treat_index_access_as_throwing: true
      treat_parse_methods_as_throwing: true
      treat_as_casts_as_throwing: true
      require_async_error_handling: true

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at
  # https://dart-lang.github.io/linter/lints/index.html.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # Enforce consistent coding style
    prefer_single_quotes: true
    prefer_final_fields: true
    prefer_final_locals: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    
    # Improve error handling
    avoid_print: false  # Allow print statements for debugging
    # Avoid calling methods or getters on values typed as `dynamic`.
    # See: https://dart.dev/tools/linter-rules/avoid_dynamic_calls
    avoid_dynamic_calls: true
    
    # Code organization
    directives_ordering: true
    sort_child_properties_last: true

analyzer:
  exclude:
    - test/**
    - lib/protobuf/**
    - lib/swagger_clients/**
    - lib/swagger_generated/**

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
